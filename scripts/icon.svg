<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M256 48 L428 128 L428 256 Q428 368 256 464 Q84 368 84 256 L84 128 Z"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <path d="M256 48 L428 128 L428 256 Q428 368 256 464 Q84 368 84 256 L84 128 Z"
        fill="url(#shine)"/>

  <!-- Shield border highlight -->
  <path d="M256 64 L404 136 L404 252 Q404 356 256 444 Q108 356 108 252 L108 136 Z"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="240" r="56" fill="none" stroke="white" stroke-width="8"/>

  <!-- Keyhole rectangle -->
  <rect x="244" y="280" width="24" height="40" rx="4" fill="white"/>

  <!-- Key handle (circle) -->
  <circle cx="280" cy="200" r="24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="7"/>

  <!-- Key shaft -->
  <line x1="300" y1="216" x2="352" y2="256" stroke="rgba(255,255,255,0.9)" stroke-width="7" stroke-linecap="round"/>

  <!-- Key teeth -->
  <line x1="340" y1="240" x2="340" y2="264" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
  <line x1="322" y1="248" x2="322" y2="268" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>

  <!-- Checkmark in keyhole (authenticated) -->
  <polyline points="232,240 252,260 280,228" fill="none" stroke="#4ADE80" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="1" dur="2s" fill="freeze"/>
  </polyline>
</svg>
