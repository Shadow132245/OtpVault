name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        arch: [x64, x86]
        include:
          - arch: x64
            rust-target: x86_64-pc-windows-msvc
          - arch: x86
            rust-target: i686-pc-windows-msvc

    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust targets
        run: |
          rustup target add x86_64-pc-windows-msvc i686-pc-windows-msvc

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $v = $tag -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_ENV
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', "`"version`": `"$v`"" | Set-Content src-tauri/tauri.conf.json
          (Get-Content package.json) -replace '"version": ".*"', "`"version`": `"$v`"" | Set-Content package.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (${{ matrix.arch }})
        run: |
          $env:SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
          $env:SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}"
          npx tauri build --bundles msi --target ${{ matrix.rust-target }}

      - name: Copy MSI to project root
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target" -Filter "OtpVault_${env:VERSION}_${{ matrix.arch }}_en-US.msi" -Recurse -ErrorAction Stop | Select-Object -First 1
          Copy-Item -Path $msi.FullName -Destination "OtpVault_${env:VERSION}_${{ matrix.arch }}_en-US.msi" -Force

      - name: Brand MSI
        run: pwsh -File scripts\brand-msi.ps1 -MsiPath "OtpVault_${env:VERSION}_${{ matrix.arch }}_en-US.msi"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: OtpVault_${{ env.VERSION }}_${{ matrix.arch }}_en-US.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
